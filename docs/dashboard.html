<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ibtuition.sg — SEO Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f9fc;
  --surface: #ffffff;
  --text: #1a1d29;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --border: #e5e7eb;
  --border-light: #f3f4f6;
  --green: #059669;
  --green-bg: #ecfdf5;
  --green-border: #a7f3d0;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --red-border: #fecaca;
  --amber: #d97706;
  --amber-bg: #fffbeb;
  --amber-border: #fde68a;
  --blue: #2563eb;
  --blue-bg: #eff6ff;
  --purple: #7c3aed;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -2px rgba(0,0,0,.1);
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Top Bar ────────────────────────────────── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: auto;
}
.topbar-brand .logo {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, #059669, #2563eb);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 800;
  font-size: 14px;
}
.topbar-brand h1 {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.topbar-meta {
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
  font-size: .82rem;
  color: var(--text-secondary);
}
.topbar-meta .sep { color: var(--border); }
.api-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--border-light);
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.api-bar {
  width: 60px;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.api-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .5s ease;
}

/* ── Alerts ─────────────────────────────────── */
.alerts { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
.alert {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin-top: 12px;
  font-size: .88rem;
  font-weight: 500;
}
.alert-danger { background: var(--red-bg); border: 1px solid var(--red-border); color: #991b1b; }
.alert-warn { background: var(--amber-bg); border: 1px solid var(--amber-border); color: #92400e; }
.alert .dismiss {
  margin-left: auto;
  cursor: pointer;
  background: none;
  border: none;
  font-size: 1.1rem;
  opacity: .5;
  transition: opacity .15s;
}
.alert .dismiss:hover { opacity: 1; }

/* ── Navigation ─────────────────────────────── */
.nav-wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 16px 24px 0;
}
.nav {
  display: flex;
  gap: 4px;
  background: var(--border-light);
  padding: 4px;
  border-radius: 10px;
  overflow-x: auto;
  width: fit-content;
}
.nav button {
  background: none;
  border: none;
  padding: 8px 16px;
  font-size: .85rem;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-secondary);
  border-radius: 7px;
  white-space: nowrap;
  transition: all .15s;
}
.nav button:hover { color: var(--text); }
.nav button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
  font-weight: 600;
}

/* ── Content ────────────────────────────────── */
.content { max-width: 1280px; margin: 0 auto; padding: 20px 24px 60px; }
.section { display: none; }
.section.active { display: block; }

/* ── Summary Cards ──────────────────────────── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.summary-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
}
.summary-card .label {
  font-size: .75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.summary-card .value {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.summary-card .sub {
  font-size: .78rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* ── Cards ──────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
  padding: 24px;
  margin-bottom: 16px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 12px;
}
.card-header h2 {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -0.01em;
}

/* ── Toggle Group ───────────────────────────── */
.toggle-group {
  display: inline-flex;
  background: var(--border-light);
  padding: 3px;
  border-radius: 8px;
  gap: 2px;
}
.toggle-group button {
  background: none;
  border: none;
  padding: 5px 12px;
  font-size: .8rem;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-secondary);
  border-radius: 6px;
  transition: all .15s;
}
.toggle-group button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
  font-weight: 600;
}

/* ── Tables ─────────────────────────────────── */
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  padding: 10px 12px;
  font-size: .75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-light);
  font-size: .88rem;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbfd; }
.kw-cell { font-weight: 600; color: var(--text); }

/* ── Rank Badges ────────────────────────────── */
.rank {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 700;
  font-size: .82rem;
}
.rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #78350f; }
.rank-2 { background: linear-gradient(135deg, #d1d5db, #9ca3af); color: #374151; }
.rank-3 { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
.rank-top10 { background: var(--green-bg); color: var(--green); }
.rank-top20 { background: var(--amber-bg); color: var(--amber); }
.rank-low { background: var(--border-light); color: var(--text-secondary); }
.rank-none { color: var(--text-muted); font-weight: 400; }

.change { font-size: .78rem; font-weight: 600; margin-left: 4px; }
.change-up { color: var(--green); }
.change-down { color: var(--red); }
.change-new { color: var(--blue); }
.change-lost { color: var(--red); }
.change-same { color: var(--text-muted); font-weight: 400; }

/* ── Competitor indicators ──────────────────── */
.comp-ahead { color: var(--green); font-weight: 600; font-size: .82rem; }
.comp-behind { color: var(--red); font-weight: 600; font-size: .82rem; }
.comp-none { color: var(--text-muted); font-size: .82rem; }

/* ── Competitor Cards ───────────────────────── */
.disc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.disc-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  border-left: 4px solid var(--amber);
  padding: 16px;
}
.disc-card h3 { font-size: .95rem; font-weight: 700; margin-bottom: 6px; }
.disc-card p { font-size: .82rem; color: var(--text-secondary); margin-bottom: 3px; }
.disc-card .action { font-size: .78rem; color: var(--green); font-style: italic; margin-top: 8px; }
.disc-card a { color: var(--blue); text-decoration: none; }
.disc-card a:hover { text-decoration: underline; }

/* ── Health Cards ───────────────────────────── */
.health-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
.health-card {
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 16px 20px;
  min-width: 260px;
  flex: 1;
}
.health-card.ok { border-left: 4px solid var(--green); }
.health-card.fail { border-left: 4px solid var(--red); background: var(--red-bg); }
.health-card .domain { font-weight: 700; font-size: .95rem; margin-bottom: 4px; }
.health-card .detail { font-size: .78rem; color: var(--text-secondary); }

/* ── Progress Bar ───────────────────────────── */
.progress-wrap { margin: 16px 0; }
.progress-label { font-size: .88rem; font-weight: 600; margin-bottom: 6px; }
.progress-sublabel { font-size: .78rem; color: var(--text-secondary); margin-bottom: 8px; }
.progress-bar {
  height: 12px;
  background: var(--border-light);
  border-radius: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--green), #34d399);
  transition: width .6s ease;
}

/* ── Chart ──────────────────────────────────── */
.chart-wrap {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
  padding: 24px;
  margin-bottom: 16px;
}
.chart-wrap h3 { font-size: .95rem; font-weight: 700; margin-bottom: 4px; }
.chart-legend {
  font-size: .78rem;
  color: var(--text-muted);
  margin-bottom: 16px;
  display: flex;
  gap: 16px;
}
.chart-legend span { display: inline-flex; align-items: center; gap: 4px; }

/* ── Status ─────────────────────────────────── */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: .75rem;
  font-weight: 600;
}
.status-ok { background: var(--green-bg); color: var(--green); }
.status-warn { background: var(--amber-bg); color: var(--amber); }
.status-bad { background: var(--red-bg); color: var(--red); }
.status-muted { background: var(--border-light); color: var(--text-muted); }

/* ── URL path ───────────────────────────────── */
.url-path { font-size: .78rem; color: var(--text-secondary); font-family: 'SF Mono', Monaco, monospace; }

/* ── Empty State ────────────────────────────── */
.empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty h2 { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 6px; }

/* ── Responsive ─────────────────────────────── */
@media (max-width: 768px) {
  .topbar { padding: 12px 16px; }
  .topbar-brand h1 { font-size: .95rem; }
  .topbar-meta { display: none; }
  .nav-wrap { padding: 12px 16px 0; }
  .content { padding: 14px 16px 40px; }
  .card { padding: 16px; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  table { font-size: .8rem; }
  th, td { padding: 8px; }
}
@media (max-width: 480px) {
  .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .summary-card { padding: 12px; }
  .summary-card .value { font-size: 1.2rem; }
  .disc-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="logo">IB</div>
    <h1>ibtuition.sg SEO</h1>
  </div>
  <div class="topbar-meta">
    <span id="lastUpdated">Updated: --</span>
    <span class="sep">|</span>
    <span id="nextRun">Next: --</span>
    <span class="sep">|</span>
    <div class="api-pill">
      <span id="apiLabel">API: --</span>
      <div class="api-bar"><div class="api-bar-fill" id="apiFill"></div></div>
    </div>
  </div>
</div>

<div class="alerts" id="alertsContainer"></div>

<div class="nav-wrap">
  <div class="nav" id="mainNav">
    <button class="active" data-tab="rankings">Rankings</button>
    <button data-tab="competitors">Competitors</button>
    <button data-tab="trends">Trends</button>
    <button data-tab="discovery">Discovery</button>
    <button data-tab="redirects">Redirects</button>
    <button data-tab="log">Run Log</button>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="section active" id="sec-rankings"></div>
  <div class="section" id="sec-competitors"></div>
  <div class="section" id="sec-trends"></div>
  <div class="section" id="sec-discovery"></div>
  <div class="section" id="sec-redirects"></div>
  <div class="section" id="sec-log"></div>
</div>

<script>
(function() {
  'use strict';

  let D = null;

  // ── Helpers ──────────────────────────────────────
  const esc = s => { if (s == null) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; };

  function fmtSGT(iso) {
    if (!iso) return '--';
    try {
      const d = new Date(iso);
      if (isNaN(d)) return String(iso);
      return d.toLocaleString('en-SG', { timeZone: 'Asia/Singapore', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: true });
    } catch { return String(iso); }
  }

  function shortPath(p, max) {
    if (!p) return '--';
    if (p === '/') return '/';
    max = max || 25;
    return p.length > max ? p.slice(0, max) + '...' : p;
  }

  function rankBadge(pos) {
    if (pos == null) return '<span class="rank-none">--</span>';
    let cls = 'rank-low';
    if (pos === 1) cls = 'rank-1';
    else if (pos === 2) cls = 'rank-2';
    else if (pos === 3) cls = 'rank-3';
    else if (pos <= 10) cls = 'rank-top10';
    else if (pos <= 20) cls = 'rank-top20';
    return '<span class="rank ' + cls + '">' + pos + '</span>';
  }

  function changeSpan(curr, prev) {
    if (curr == null && prev == null) return '';
    if (curr == null) return '<span class="change change-lost">Lost</span>';
    if (prev == null) return '<span class="change change-new">New</span>';
    const diff = prev - curr;
    if (diff > 0) return '<span class="change change-up">+' + diff + '</span>';
    if (diff < 0) return '<span class="change change-down">' + diff + '</span>';
    return '<span class="change change-same">=</span>';
  }

  function findRow(kw, dev, list) {
    if (!list) return null;
    return list.find(r => r.keyword === kw && r.device === dev && r.is_my_domain) || null;
  }

  function findDomainRow(kw, dev, domain, list) {
    if (!list) return null;
    return list.find(r => r.keyword === kw && r.device === dev && r.domain === domain) || null;
  }

  function bestComp(kw, dev, list) {
    if (!list) return null;
    let best = null;
    for (const r of list) {
      if (r.keyword !== kw || r.device !== dev || r.is_my_domain || r.position == null) continue;
      if (!best || r.position < best.position) best = r;
    }
    return best;
  }

  function keywords(list) {
    const s = new Set();
    if (list) list.forEach(r => s.add(r.keyword));
    return Array.from(s);
  }

  function domains(list) {
    const s = new Set();
    if (list) list.forEach(r => { if (!r.is_my_domain && r.domain) s.add(r.domain); });
    return Array.from(s).sort();
  }

  function myDom(list) {
    if (!list) return null;
    const r = list.find(x => x.is_my_domain);
    return r ? r.domain : null;
  }

  // ── Tab Nav ──────────────────────────────────────
  document.getElementById('mainNav').addEventListener('click', function(e) {
    if (e.target.tagName !== 'BUTTON') return;
    this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + e.target.dataset.tab).classList.add('active');
  });

  // ── Fetch & Render ───────────────────────────────
  fetch('./data.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => { D = data; render(); })
    .catch(() => {
      document.getElementById('mainContent').innerHTML =
        '<div class="empty"><h2>No data yet</h2><p>Run the tracker to start collecting rankings.</p></div>';
    });

  function render() {
    if (!D) return;
    renderTopbar();
    renderAlerts();
    renderRankings();
    renderCompetitors();
    renderTrends();
    renderDiscovery();
    renderRedirects();
    renderLog();
  }

  // ── Topbar ───────────────────────────────────────
  function renderTopbar() {
    const m = D.meta || {};
    document.getElementById('lastUpdated').textContent = 'Updated: ' + fmtSGT(m.last_run);
    document.getElementById('nextRun').textContent = 'Next: ' + fmtSGT(m.next_run);
    const used = m.api_used_this_month || 0;
    const limit = m.api_limit || 100;
    const pct = m.api_percent != null ? m.api_percent : Math.round(used / limit * 100);
    document.getElementById('apiLabel').textContent = used + '/' + limit;
    const fill = document.getElementById('apiFill');
    fill.style.width = Math.min(pct, 100) + '%';
    fill.style.background = pct < 50 ? 'var(--green)' : pct < 80 ? 'var(--amber)' : 'var(--red)';
  }

  // ── Alerts ───────────────────────────────────────
  function renderAlerts() {
    const c = document.getElementById('alertsContainer');
    let h = '';
    const health = (D.redirect || {}).health || [];
    const bad = health.filter(x => !x.is_healthy);
    if (bad.length) {
      h += '<div class="alert alert-danger">&#x1F6A8; Redirect health FAILED: ' +
        bad.map(x => esc(x.old_domain)).join(', ') +
        '<button class="dismiss">&times;</button></div>';
    }
    const nc = ((D.discovered_competitors || {}).unalerted || []);
    if (nc.length) {
      h += '<div class="alert alert-warn">&#x1F195; ' + nc.length + ' new competitor' + (nc.length > 1 ? 's' : '') +
        ' detected in top 5<button class="dismiss">&times;</button></div>';
    }
    const uc = D.url_changes || [];
    if (uc.length) {
      h += '<div class="alert alert-warn">&#x26A0;&#xFE0F; Ranking page changed for ' + uc.length +
        ' keyword' + (uc.length > 1 ? 's' : '') + '<button class="dismiss">&times;</button></div>';
    }
    c.innerHTML = h;
    c.querySelectorAll('.dismiss').forEach(b => b.onclick = function() { this.closest('.alert').remove(); });
  }

  // ── Rankings ─────────────────────────────────────
  function renderRankings() {
    const sec = document.getElementById('sec-rankings');
    const latest = (D.rankings || {}).latest || [];
    const previous = (D.rankings || {}).previous || [];
    const kws = keywords(latest.length ? latest : previous);
    const md = myDom(latest);

    // Summary cards
    const myRows = latest.filter(r => r.is_my_domain && r.position != null);
    const top3 = myRows.filter(r => r.position <= 3).length;
    const top10 = myRows.filter(r => r.position <= 10).length;
    const avgPos = myRows.length ? Math.round(myRows.reduce((a, r) => a + r.position, 0) / myRows.length) : '--';
    const totalKw = kws.length;

    let html = '<div class="summary-grid">' +
      summaryCard('Avg Position', avgPos, myRows.length ? 'Across ' + myRows.length + ' ranked slots' : 'No rankings yet') +
      summaryCard('Top 3', top3, 'Out of ' + (totalKw * 2) + ' keyword+device slots') +
      summaryCard('Top 10', top10, 'Out of ' + (totalKw * 2) + ' keyword+device slots') +
      summaryCard('Keywords', totalKw, 'Desktop & mobile tracked') +
      '</div>';

    html += '<div class="card"><div class="card-header"><h2>ibtuition.sg Rankings</h2>' +
      '<div class="toggle-group" id="devToggle">' +
      '<button class="active" data-dev="both">Both</button>' +
      '<button data-dev="desktop">Desktop</button>' +
      '<button data-dev="mobile">Mobile</button>' +
      '</div></div><div id="rankTbl"></div></div>';

    sec.innerHTML = html;
    document.getElementById('devToggle').addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      buildRankTbl(e.target.dataset.dev);
    });
    buildRankTbl('both');
  }

  function summaryCard(label, value, sub) {
    return '<div class="summary-card"><div class="label">' + label + '</div>' +
      '<div class="value">' + value + '</div>' +
      '<div class="sub">' + esc(sub) + '</div></div>';
  }

  function buildRankTbl(mode) {
    const latest = (D.rankings || {}).latest || [];
    const previous = (D.rankings || {}).previous || [];
    const kws = keywords(latest.length ? latest : previous);
    if (!kws.length) {
      document.getElementById('rankTbl').innerHTML = '<p style="color:var(--text-muted);padding:20px 0;">No ranking data available.</p>';
      return;
    }

    let h = '<table><thead><tr><th>Keyword</th>';
    if (mode === 'both') {
      h += '<th>Desktop</th><th>Mobile</th><th>Best Competitor</th>';
    } else {
      h += '<th>Rank</th><th>Change</th><th>Page</th><th>Best Competitor</th>';
    }
    h += '</tr></thead><tbody>';

    for (const kw of kws) {
      h += '<tr><td class="kw-cell">' + esc(kw) + '</td>';
      if (mode === 'both') {
        const rd = findRow(kw, 'desktop', latest);
        const rm = findRow(kw, 'mobile', latest);
        const rpd = findRow(kw, 'desktop', previous);
        const rpm = findRow(kw, 'mobile', previous);
        h += '<td>' + rankBadge(rd ? rd.position : null) + changeSpan(rd ? rd.position : null, rpd ? rpd.position : null) +
          '<span class="url-path" style="display:block;margin-top:2px;">' + shortPath(rd ? rd.url_path : null) + '</span></td>';
        h += '<td>' + rankBadge(rm ? rm.position : null) + changeSpan(rm ? rm.position : null, rpm ? rpm.position : null) +
          '<span class="url-path" style="display:block;margin-top:2px;">' + shortPath(rm ? rm.url_path : null) + '</span></td>';
        const cd = bestComp(kw, 'desktop', latest);
        const cm = bestComp(kw, 'mobile', latest);
        const bc = cd && cm ? (cd.position <= cm.position ? cd : cm) : (cd || cm);
        const myBest = Math.min(rd && rd.position != null ? rd.position : 999, rm && rm.position != null ? rm.position : 999);
        h += '<td>' + compHTML(bc, myBest) + '</td>';
      } else {
        const r = findRow(kw, mode, latest);
        const rp = findRow(kw, mode, previous);
        const pos = r ? r.position : null;
        const prevPos = rp ? rp.position : null;
        const bc = bestComp(kw, mode, latest);
        h += '<td>' + rankBadge(pos) + '</td>';
        h += '<td>' + changeSpan(pos, prevPos) + '</td>';
        h += '<td><span class="url-path">' + shortPath(r ? r.url_path : null) + '</span></td>';
        h += '<td>' + compHTML(bc, pos) + '</td>';
      }
      h += '</tr>';
    }
    h += '</tbody></table>';
    document.getElementById('rankTbl').innerHTML = h;
  }

  function compHTML(comp, myPos) {
    if (!comp) return '<span class="comp-none">--</span>';
    const ahead = myPos != null && myPos < 999 && myPos <= comp.position;
    return '<span class="' + (ahead ? 'comp-ahead' : 'comp-behind') + '">' +
      esc(comp.domain) + ' #' + comp.position + '</span>';
  }

  // ── Competitors ──────────────────────────────────
  function renderCompetitors() {
    const sec = document.getElementById('sec-competitors');
    const latest = (D.rankings || {}).latest || [];
    const md = myDom(latest);
    const doms = [md].concat(domains(latest)).filter(Boolean);
    if (!doms.length) { sec.innerHTML = '<div class="card"><p style="color:var(--text-muted)">No competitor data.</p></div>'; return; }

    let btns = '<div class="toggle-group" id="compToggle">';
    doms.forEach((d, i) => {
      btns += '<button data-domain="' + esc(d) + '"' + (i === 0 ? ' class="active"' : '') + '>' +
        (d === md ? 'ibtuition.sg' : esc(d)) + '</button>';
    });
    btns += '</div>';

    sec.innerHTML = '<div class="card"><div class="card-header"><h2>Head-to-Head Comparison</h2>' + btns + '</div><div id="compTbl"></div></div>';
    document.getElementById('compToggle').addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      buildCompTbl(e.target.dataset.domain);
    });
    buildCompTbl(doms[0]);
  }

  function buildCompTbl(domain) {
    const latest = (D.rankings || {}).latest || [];
    const kws = keywords(latest);
    let h = '<table><thead><tr><th>Keyword</th><th>Desktop</th><th>Page</th><th>Mobile</th><th>Page</th></tr></thead><tbody>';
    for (const kw of kws) {
      const rd = latest.find(r => r.keyword === kw && r.device === 'desktop' && r.domain === domain);
      const rm = latest.find(r => r.keyword === kw && r.device === 'mobile' && r.domain === domain);
      h += '<tr><td class="kw-cell">' + esc(kw) + '</td>';
      h += '<td>' + rankBadge(rd ? rd.position : null) + '</td>';
      h += '<td><span class="url-path">' + shortPath(rd ? rd.url_path : null) + '</span></td>';
      h += '<td>' + rankBadge(rm ? rm.position : null) + '</td>';
      h += '<td><span class="url-path">' + shortPath(rm ? rm.url_path : null) + '</span></td></tr>';
    }
    h += '</tbody></table>';
    document.getElementById('compTbl').innerHTML = h;
  }

  // ── Trends ───────────────────────────────────────
  function renderTrends() {
    const sec = document.getElementById('sec-trends');
    const history = (D.rankings || {}).history_14_runs || [];
    const latest = (D.rankings || {}).latest || [];
    const kws = keywords(latest);
    if (!kws.length || !history.length) {
      sec.innerHTML = '<div class="card"><div class="empty"><h2>Not enough data</h2><p>Trends will appear after a few runs.</p></div></div>';
      return;
    }

    let h = '<div class="chart-wrap"><h3>Position Trends (Last 14 Runs)</h3>' +
      '<div class="chart-legend">' +
      '<span><svg width="16" height="3"><rect width="16" height="3" rx="1" fill="var(--blue)"/></svg> Desktop</span>' +
      '<span><svg width="16" height="3"><rect width="16" height="3" rx="1" fill="#f97316"/></svg> Mobile</span>' +
      '<span style="color:var(--text-muted)">Lower = better (top of chart = #1)</span>' +
      '</div>' +
      '<table><thead><tr><th>Keyword</th><th style="width:140px">Sparkline</th><th>Desktop</th><th>Mobile</th></tr></thead><tbody>';

    for (const kw of kws) {
      const dp = [], mp = [];
      for (const run of history) {
        const rnk = run.rankings || [];
        const rd = rnk.find(r => r.keyword === kw && r.device === 'desktop' && r.is_my_domain);
        const rm = rnk.find(r => r.keyword === kw && r.device === 'mobile' && r.is_my_domain);
        dp.push(rd && rd.position != null ? rd.position : null);
        mp.push(rm && rm.position != null ? rm.position : null);
      }
      const rd = findRow(kw, 'desktop', latest);
      const rm = findRow(kw, 'mobile', latest);
      h += '<tr><td class="kw-cell">' + esc(kw) + '</td>';
      h += '<td>' + sparkSVG(dp, mp) + '</td>';
      h += '<td>' + rankBadge(rd ? rd.position : null) + '</td>';
      h += '<td>' + rankBadge(rm ? rm.position : null) + '</td></tr>';
    }
    h += '</tbody></table></div>';
    sec.innerHTML = h;
  }

  function sparkSVG(dp, mp) {
    const W = 130, H = 32, P = 3;
    const all = dp.concat(mp).filter(v => v != null);
    if (!all.length) return '<span class="rank-none">--</span>';
    const mn = 1, mx = Math.max(Math.max(...all), 10);
    const n = Math.max(dp.length, mp.length);
    function path(pts, col) {
      const segs = [];
      let on = false;
      for (let i = 0; i < pts.length; i++) {
        if (pts[i] == null) { on = false; continue; }
        const x = P + (i / Math.max(n - 1, 1)) * (W - 2 * P);
        const y = P + ((pts[i] - mn) / (mx - mn)) * (H - 2 * P);
        segs.push((on ? 'L' : 'M') + x.toFixed(1) + ',' + y.toFixed(1));
        on = true;
      }
      return segs.length ? '<path d="' + segs.join(' ') + '" fill="none" stroke="' + col + '" stroke-width="1.5" stroke-linecap="round"/>' : '';
    }
    return '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" style="vertical-align:middle">' +
      path(dp, 'var(--blue)') + path(mp, '#f97316') + '</svg>';
  }

  // ── Discovery ────────────────────────────────────
  function renderDiscovery() {
    const sec = document.getElementById('sec-discovery');
    const disc = D.discovered_competitors || {};
    const unalerted = disc.unalerted || [];
    const all = disc.all || [];
    let h = '';

    if (unalerted.length) {
      h += '<div class="card"><div class="card-header"><h2>Newly Discovered</h2>' +
        '<span class="status-badge status-warn">' + unalerted.length + ' new</span></div>' +
        '<div class="disc-grid">';
      for (const c of unalerted) {
        h += '<div class="disc-card"><h3>' + esc(c.domain) + '</h3>';
        h += '<p>Keyword: <strong>' + esc(c.first_seen_keyword) + '</strong> at #' + (c.first_seen_position || '?') + '</p>';
        h += '<p>Device: ' + esc(c.first_seen_device || '?') + ' &middot; ' + esc(c.first_seen_date || '') + '</p>';
        if (c.first_seen_url) h += '<p><a href="' + esc(c.first_seen_url) + '" target="_blank" rel="noopener">View page &rarr;</a></p>';
        h += '<p class="action">Add to config.json to track</p></div>';
      }
      h += '</div></div>';
    }

    if (all.length) {
      h += '<div class="card"><div class="card-header"><h2>All Discovered Competitors</h2></div>' +
        '<table><thead><tr><th>Domain</th><th>Keyword</th><th>Pos</th><th>Device</th><th>Date</th><th>Status</th></tr></thead><tbody>';
      for (const c of all) {
        h += '<tr><td class="kw-cell">' + esc(c.domain) + '</td><td>' + esc(c.first_seen_keyword) + '</td>';
        h += '<td>' + rankBadge(c.first_seen_position) + '</td><td>' + esc(c.first_seen_device || '--') + '</td>';
        h += '<td>' + esc(c.first_seen_date || '--') + '</td>';
        h += '<td>' + (c.alerted ? '<span class="status-badge status-ok">Alerted</span>' : '<span class="status-badge status-warn">New</span>') + '</td></tr>';
      }
      h += '</tbody></table></div>';
    }

    sec.innerHTML = h || '<div class="card"><div class="empty"><h2>No new competitors</h2><p>Auto-discovery monitors the top 5 results.</p></div></div>';
  }

  // ── Redirects ────────────────────────────────────
  function renderRedirects() {
    const sec = document.getElementById('sec-redirects');
    const redir = D.redirect || {};
    const health = redir.health || [];
    const consKw = redir.consolidation_by_keyword || [];
    const pct = redir.overall_consolidation_pct || 0;
    const hist = redir.history_30_days || [];
    const sightings = redir.sightings_latest_run || [];
    let h = '';

    // Health cards
    if (health.length) {
      h += '<div class="health-grid">';
      for (const x of health) {
        const ok = x.is_healthy;
        h += '<div class="health-card ' + (ok ? 'ok' : 'fail') + '">';
        h += '<div class="domain">' + esc(x.old_domain) + ' &rarr; ' + (ok ? '&#x2705; 301 Healthy' : '&#x274C; UNHEALTHY') + '</div>';
        h += '<div class="detail">HTTP ' + (x.http_status || '?') + ' &middot; ' + fmtSGT(x.checked_at) + '</div>';
        if (x.final_destination_url) h += '<div class="detail">&rarr; ' + esc(x.final_destination_url) + '</div>';
        if (x.error) h += '<div class="detail" style="color:var(--red)">' + esc(x.error) + '</div>';
        h += '</div>';
      }
      h += '</div>';
    }

    // Consolidation progress
    const total = consKw.length || 1;
    const done = consKw.filter(c => c.desktop_status === 'only_main' && c.mobile_status === 'only_main').length;
    h += '<div class="card"><div class="card-header"><h2>Google Index Consolidation</h2></div>';
    h += '<div class="progress-wrap"><div class="progress-label">' + pct + '% Complete</div>';
    h += '<div class="progress-sublabel">' + done + ' of ' + consKw.length + ' keyword+domain combos fully consolidated</div>';
    h += '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(pct, 100) + '%"></div></div></div></div>';

    // Consolidation chart
    if (hist.length > 1) {
      h += '<div class="chart-wrap"><h3>Consolidation Timeline</h3>';
      h += consolidationSVG(hist) + '</div>';
    }

    // Per-keyword table
    if (consKw.length) {
      h += '<div class="card"><div class="card-header"><h2>Per-Keyword Status</h2></div>' +
        '<table><thead><tr><th>Keyword</th><th>Old Domain</th><th>Desktop</th><th>Mobile</th></tr></thead><tbody>';
      for (const c of consKw) {
        h += '<tr><td class="kw-cell">' + esc(c.keyword) + '</td>';
        h += '<td>' + esc(c.old_domain) + '</td>';
        h += '<td>' + statusBadge(c.desktop_status) + '</td>';
        h += '<td>' + statusBadge(c.mobile_status) + '</td></tr>';
      }
      h += '</tbody></table></div>';
    }

    sec.innerHTML = h || '<div class="card"><div class="empty"><h2>No redirect data</h2><p>Redirect tracking will appear after the first run.</p></div></div>';
  }

  function statusBadge(status) {
    const m = {
      'outranking': '<span class="status-badge status-bad">Outranking</span>',
      'both_present': '<span class="status-badge status-warn">Both Present</span>',
      'only_main': '<span class="status-badge status-ok">Consolidated</span>',
      'only_redirect': '<span class="status-badge status-bad">Only Redirect</span>',
      'neither': '<span class="status-badge status-muted">Neither</span>'
    };
    return m[status] || '<span class="status-badge status-muted">' + esc(status || '--') + '</span>';
  }

  function consolidationSVG(hist) {
    const W = 600, H = 180, PL = 40, PR = 20, PT = 10, PB = 35;
    const cW = W - PL - PR, cH = H - PT - PB;
    const n = hist.length;
    let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="max-width:100%;height:auto">';

    // Grid
    for (let p = 0; p <= 100; p += 25) {
      const y = PT + cH - (p / 100) * cH;
      svg += '<line x1="' + PL + '" y1="' + y + '" x2="' + (W - PR) + '" y2="' + y + '" stroke="var(--border-light)" stroke-width="1"/>';
      svg += '<text x="' + (PL - 6) + '" y="' + (y + 4) + '" text-anchor="end" font-size="10" fill="var(--text-muted)">' + p + '%</text>';
    }

    // Goal line
    svg += '<line x1="' + PL + '" y1="' + PT + '" x2="' + (W - PR) + '" y2="' + PT + '" stroke="var(--green)" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/>';

    // Area + line
    const pts = [];
    for (let i = 0; i < n; i++) {
      const x = PL + (i / Math.max(n - 1, 1)) * cW;
      const p = hist[i].pct != null ? hist[i].pct : 0;
      const y = PT + cH - (p / 100) * cH;
      pts.push([x, y]);
    }

    // Fill area
    let area = 'M' + pts[0][0] + ',' + (PT + cH);
    pts.forEach(p => area += 'L' + p[0].toFixed(1) + ',' + p[1].toFixed(1));
    area += 'L' + pts[pts.length - 1][0] + ',' + (PT + cH) + 'Z';
    svg += '<path d="' + area + '" fill="var(--green)" opacity=".08"/>';

    // Line
    let line = 'M' + pts[0][0].toFixed(1) + ',' + pts[0][1].toFixed(1);
    for (let i = 1; i < pts.length; i++) line += 'L' + pts[i][0].toFixed(1) + ',' + pts[i][1].toFixed(1);
    svg += '<path d="' + line + '" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"/>';

    // Dots
    pts.forEach(p => svg += '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="3" fill="var(--green)"/>');

    // X labels
    const step = Math.max(1, Math.floor(n / 5));
    for (let i = 0; i < n; i += step) {
      svg += '<text x="' + pts[i][0].toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="9" fill="var(--text-muted)">' + esc(hist[i].date || '') + '</text>';
    }
    if ((n - 1) % step !== 0) {
      svg += '<text x="' + pts[n - 1][0].toFixed(1) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="9" fill="var(--text-muted)">' + esc(hist[n - 1].date || '') + '</text>';
    }

    svg += '</svg>';
    return svg;
  }

  // ── Run Log ──────────────────────────────────────
  function renderLog() {
    const sec = document.getElementById('sec-log');
    const logs = (D.run_log || []).slice(0, 10);
    if (!logs.length) { sec.innerHTML = '<div class="card"><div class="empty"><h2>No runs yet</h2></div></div>'; return; }

    let h = '<div class="card"><div class="card-header"><h2>Run Log</h2></div>' +
      '<table><thead><tr><th>Time (SGT)</th><th>Keywords</th><th>API Calls</th><th>Status</th><th>Errors</th></tr></thead><tbody>';
    for (const l of logs) {
      const st = l.status === 'ok' ? 'status-ok' : l.status === 'partial_error' ? 'status-warn' : 'status-bad';
      const errs = l.errors && l.errors !== '[]' ? l.errors : '--';
      h += '<tr><td>' + fmtSGT(l.run_time) + '</td>';
      h += '<td>' + (l.keywords_checked != null ? l.keywords_checked : '--') + '</td>';
      h += '<td>' + (l.api_calls_used != null ? l.api_calls_used : '--') + '</td>';
      h += '<td><span class="status-badge ' + st + '">' + esc(l.status || '--') + '</span></td>';
      h += '<td style="font-size:.78rem;max-width:300px;overflow:hidden;text-overflow:ellipsis">' + esc(errs) + '</td></tr>';
    }
    h += '</tbody></table></div>';
    sec.innerHTML = h;
  }

})();
</script>
</body>
</html>
