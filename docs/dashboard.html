<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ibtuition.sg — SEO Rankings Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #FAF8F5; --text: #1a1a1a; --green: #2D6A4F; --red: #C1121F;
  --yellow: #E9C46A; --card: #fff; --shadow: 0 1px 4px rgba(0,0,0,.08);
  --radius: 8px; --blue: #2563EB; --orange: #EA580C;
}
body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 15px; line-height: 1.5; }
h1, h2, h3 { font-family: Georgia, 'Times New Roman', serif; font-weight: 700; }
a { color: var(--green); }

/* Header */
.header { background: #fff; border-bottom: 1px solid #e5e0d8; padding: 16px 24px; display: flex; flex-wrap: wrap; align-items: center; gap: 16px; }
.header h1 { font-size: 1.3rem; margin-right: auto; }
.header-meta { font-size: .82rem; color: #666; display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
.api-bar-wrap { display: flex; align-items: center; gap: 6px; }
.api-bar { width: 110px; height: 10px; background: #e5e0d8; border-radius: 5px; overflow: hidden; }
.api-bar-fill { height: 100%; border-radius: 5px; transition: width .4s; }

/* Alerts */
.alerts { padding: 0 24px; }
.alert { padding: 10px 16px; border-radius: var(--radius); margin-top: 10px; display: flex; align-items: center; gap: 8px; font-size: .9rem; }
.alert-red { background: #fde8e8; border: 1px solid #f5c6cb; color: #721c24; }
.alert-yellow { background: #fff8e1; border: 1px solid #ffe082; color: #6d5e00; }
.alert .dismiss { margin-left: auto; cursor: pointer; background: none; border: none; font-size: 1.1rem; opacity: .6; }
.alert .dismiss:hover { opacity: 1; }

/* Nav */
.nav { display: flex; gap: 0; padding: 12px 24px 0; border-bottom: 1px solid #e5e0d8; overflow-x: auto; }
.nav button { background: none; border: none; padding: 8px 18px; font-size: .9rem; cursor: pointer; color: #666; border-bottom: 2px solid transparent; white-space: nowrap; }
.nav button.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }

/* Content */
.content { padding: 20px 24px 40px; max-width: 1400px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; }

/* Cards */
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 1.1rem; margin-bottom: 12px; }
.card h3 { font-size: .95rem; margin-bottom: 8px; }

/* Toggle buttons */
.toggle-group { display: inline-flex; border: 1px solid #d0ccc4; border-radius: 6px; overflow: hidden; margin-bottom: 12px; }
.toggle-group button { background: #fff; border: none; border-right: 1px solid #d0ccc4; padding: 6px 14px; font-size: .82rem; cursor: pointer; }
.toggle-group button:last-child { border-right: none; }
.toggle-group button.active { background: var(--green); color: #fff; }

/* Tables */
table { width: 100%; border-collapse: collapse; font-size: .85rem; }
th { text-align: left; padding: 8px 10px; background: #f5f2ed; font-weight: 600; border-bottom: 2px solid #e5e0d8; white-space: nowrap; }
td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
tr:hover td { background: #faf7f2; }

/* Rank cells */
.rank-top3 { background: var(--green); color: #fff; font-weight: 700; border-radius: 4px; text-align: center; display: inline-block; min-width: 28px; padding: 1px 6px; }
.rank-top10 { background: #fef3c7; border-radius: 4px; text-align: center; display: inline-block; min-width: 28px; padding: 1px 6px; }
.rank-top20 { background: #ffedd5; border-radius: 4px; text-align: center; display: inline-block; min-width: 28px; padding: 1px 6px; }
.rank-low { background: #e5e5e5; border-radius: 4px; text-align: center; display: inline-block; min-width: 28px; padding: 1px 6px; color: #666; }
.rank-none { color: #999; }

.change-up { color: var(--green); font-weight: 600; font-size: .8rem; }
.change-down { color: var(--red); font-weight: 600; font-size: .8rem; }
.change-same { color: #999; font-size: .8rem; }
.url-changed-icon { cursor: help; }
.comp-ahead { color: var(--green); }
.comp-behind { color: var(--red); }

/* Competitor cards */
.comp-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; margin-bottom: 20px; }
.comp-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; border-left: 4px solid var(--yellow); }
.comp-card h3 { font-size: 1rem; margin-bottom: 4px; }
.comp-card p { font-size: .82rem; color: #555; margin-bottom: 2px; }
.comp-card .note { font-size: .78rem; color: var(--green); margin-top: 8px; font-style: italic; }

/* Progress bar */
.progress-wrap { margin: 12px 0; }
.progress-label { font-size: .9rem; margin-bottom: 4px; }
.progress-bar { height: 18px; background: #e5e0d8; border-radius: 9px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 9px; background: var(--green); transition: width .5s; }

/* Health cards */
.health-cards { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
.health-card { padding: 12px 16px; border-radius: var(--radius); box-shadow: var(--shadow); background: var(--card); min-width: 250px; }
.health-card.healthy { border-left: 4px solid var(--green); }
.health-card.unhealthy { border-left: 4px solid var(--red); background: #fef2f2; }

/* SVG chart */
.chart-container { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px; }
.chart-container svg { width: 100%; }

/* Status icons */
.status-icon { font-size: .9rem; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: #888; }
.empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; color: #666; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 12px 14px; }
  .header h1 { font-size: 1.1rem; width: 100%; }
  .nav { padding: 8px 14px 0; }
  .nav button { padding: 6px 12px; font-size: .8rem; }
  .content { padding: 14px; }
  table { font-size: .78rem; }
  th, td { padding: 5px 6px; }
  .card { padding: 14px; }
  .comp-cards { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .header-meta { flex-direction: column; gap: 4px; }
  .api-bar { width: 80px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>ibtuition.sg — SEO Rankings</h1>
  <div class="header-meta">
    <span id="lastUpdated">Last updated: —</span>
    <span id="nextRun">Next run: —</span>
    <div class="api-bar-wrap">
      <span id="apiLabel">API: —</span>
      <div class="api-bar"><div class="api-bar-fill" id="apiFill"></div></div>
    </div>
  </div>
</div>

<div class="alerts" id="alertsContainer"></div>

<div class="nav" id="mainNav">
  <button class="active" data-tab="rankings">Rankings</button>
  <button data-tab="competitors">Competitors</button>
  <button data-tab="trends">Trends</button>
  <button data-tab="newcompetitors">New Competitors</button>
  <button data-tab="redirects">Redirects</button>
  <button data-tab="runlog">Run Log</button>
</div>

<div class="content" id="mainContent">
  <div class="section active" id="sec-rankings"></div>
  <div class="section" id="sec-competitors"></div>
  <div class="section" id="sec-trends"></div>
  <div class="section" id="sec-newcompetitors"></div>
  <div class="section" id="sec-redirects"></div>
  <div class="section" id="sec-runlog"></div>
</div>

<script>
(function() {
  'use strict';

  let DATA = null;

  // ── Helpers ──────────────────────────────────────────────────
  function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
  function fmtSGT(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      if (isNaN(d)) return String(iso);
      return d.toLocaleString('en-SG', { timeZone: 'Asia/Singapore', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true }) + ' SGT';
    } catch { return String(iso); }
  }
  function shortPath(p, max) {
    if (!p) return '—';
    if (p === '/') return 'Home';
    max = max || 25;
    return p.length > max ? p.slice(0, max) + '...' : p;
  }
  function rankClass(pos) {
    if (pos == null) return 'rank-none';
    if (pos <= 3) return 'rank-top3';
    if (pos <= 10) return 'rank-top10';
    if (pos <= 20) return 'rank-top20';
    return 'rank-low';
  }
  function rankHTML(pos) {
    if (pos == null) return '<span class="rank-none">—</span>';
    return '<span class="' + rankClass(pos) + '">' + pos + '</span>';
  }
  function changeHTML(curr, prev) {
    if (curr == null && prev == null) return '<span class="change-same">—</span>';
    if (curr == null) return '<span class="change-down">Lost</span>';
    if (prev == null) return '<span class="change-up">New</span>';
    const diff = prev - curr;
    if (diff > 0) return '<span class="change-up">&uarr;' + diff + '</span>';
    if (diff < 0) return '<span class="change-down">&darr;' + Math.abs(diff) + '</span>';
    return '<span class="change-same">=</span>';
  }
  function bestCompetitor(keyword, device, list) {
    if (!list || !list.length) return null;
    let best = null;
    for (const r of list) {
      if (r.keyword !== keyword || r.device !== device) continue;
      if (r.is_my_domain) continue;
      if (r.position == null) continue;
      if (!best || r.position < best.position) best = r;
    }
    return best;
  }
  function findRanking(keyword, device, list) {
    if (!list) return null;
    return list.find(r => r.keyword === keyword && r.device === device) || null;
  }
  function uniqueKeywords(list) {
    const s = new Set();
    if (list) list.forEach(r => s.add(r.keyword));
    return Array.from(s);
  }
  function uniqueDomains(list) {
    const s = new Set();
    if (list) list.forEach(r => { if (!r.is_my_domain && r.domain) s.add(r.domain); });
    return Array.from(s).sort();
  }
  function myDomain(list) {
    if (!list) return null;
    const r = list.find(x => x.is_my_domain);
    return r ? r.domain : null;
  }

  // ── Tab Navigation ──────────────────────────────────────────
  document.getElementById('mainNav').addEventListener('click', function(e) {
    if (e.target.tagName !== 'BUTTON') return;
    this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + e.target.dataset.tab).classList.add('active');
  });

  // ── Fetch & Render ──────────────────────────────────────────
  fetch('./data.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => { DATA = data; render(); })
    .catch(() => {
      document.getElementById('mainContent').innerHTML =
        '<div class="empty-state"><h2>No data yet</h2><p>Run the tracker to start collecting rankings.</p></div>';
    });

  function render() {
    if (!DATA) return;
    renderHeader();
    renderAlerts();
    renderRankings();
    renderCompetitors();
    renderTrends();
    renderNewCompetitors();
    renderRedirects();
    renderRunLog();
  }

  // ── Header ──────────────────────────────────────────────────
  function renderHeader() {
    const m = DATA.meta || {};
    document.getElementById('lastUpdated').textContent = 'Last updated: ' + fmtSGT(m.last_run);
    document.getElementById('nextRun').textContent = 'Next run: ' + fmtSGT(m.next_run);
    const used = m.api_used_this_month || 0;
    const limit = m.api_limit || 100;
    const pct = m.api_percent != null ? m.api_percent : Math.round(used / limit * 100);
    document.getElementById('apiLabel').textContent = 'API: ' + used + '/' + limit;
    const fill = document.getElementById('apiFill');
    fill.style.width = Math.min(pct, 100) + '%';
    fill.style.background = pct < 60 ? 'var(--green)' : pct < 80 ? 'var(--yellow)' : 'var(--red)';
  }

  // ── Alerts ──────────────────────────────────────────────────
  function renderAlerts() {
    const c = document.getElementById('alertsContainer');
    let html = '';
    const redir = DATA.redirect || {};
    const health = redir.health || [];
    const unhealthy = health.filter(h => !h.is_healthy);
    if (unhealthy.length) {
      const doms = unhealthy.map(h => h.old_domain).join(', ');
      html += alertBanner('red', 'Redirect health check FAILED — ' + esc(doms) + ' not returning 301');
    }
    const disc = DATA.discovered_competitors || {};
    if ((disc.unalerted || []).length) {
      html += alertBanner('yellow', 'New competitor detected in top 5');
    }
    const uc = DATA.url_changes || [];
    if (uc.length) {
      html += alertBanner('yellow', 'Ranking page changed for ' + uc.length + ' keyword' + (uc.length > 1 ? 's' : ''));
    }
    c.innerHTML = html;
    c.querySelectorAll('.dismiss').forEach(btn => btn.addEventListener('click', function() { this.closest('.alert').style.display = 'none'; }));
  }
  function alertBanner(type, msg) {
    return '<div class="alert alert-' + type + '">' +
      '<span>' + (type === 'red' ? '&#x1F534;' : '&#x1F7E1;') + ' ' + msg + '</span>' +
      '<button class="dismiss" title="Dismiss">&times;</button></div>';
  }

  // ── Rankings ────────────────────────────────────────────────
  function renderRankings() {
    const sec = document.getElementById('sec-rankings');
    sec.innerHTML = '<div class="card"><h2>My Rankings</h2>' +
      '<div class="toggle-group" id="deviceToggle">' +
      '<button data-dev="desktop">&#x1F5A5; Desktop</button>' +
      '<button data-dev="mobile">&#x1F4F1; Mobile</button>' +
      '<button class="active" data-dev="both">Both</button>' +
      '</div><div id="rankingsTable"></div></div>';
    document.getElementById('deviceToggle').addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      buildRankingsTable(e.target.dataset.dev);
    });
    buildRankingsTable('both');
  }

  function buildRankingsTable(mode) {
    const latest = (DATA.rankings || {}).latest || [];
    const previous = (DATA.rankings || {}).previous || [];
    const urlChanges = DATA.url_changes || [];
    const keywords = uniqueKeywords(latest.length ? latest : previous);
    if (!keywords.length) {
      document.getElementById('rankingsTable').innerHTML = '<p style="color:#888">No ranking data available.</p>';
      return;
    }

    let html = '<table><thead><tr>';
    if (mode === 'both') {
      html += '<th>Keyword</th><th>&#x1F5A5; Rank</th><th>&#x1F5A5; Page</th><th>&#x1F4F1; Rank</th><th>&#x1F4F1; Page</th><th>Best Competitor</th>';
    } else {
      html += '<th>Keyword</th><th>Rank</th><th>Change</th><th>Ranking Page</th><th>URL Changed?</th><th>Best Competitor</th>';
    }
    html += '</tr></thead><tbody>';

    for (const kw of keywords) {
      if (mode === 'both') {
        const rd = findRanking(kw, 'desktop', latest);
        const rm = findRanking(kw, 'mobile', latest);
        const compD = bestCompetitor(kw, 'desktop', latest);
        const compM = bestCompetitor(kw, 'mobile', latest);
        const bestComp = compD && compM ? (compD.position <= compM.position ? compD : compM) : (compD || compM);
        const myBest = Math.min(rd && rd.position != null ? rd.position : 999, rm && rm.position != null ? rm.position : 999);
        html += '<tr><td><strong>' + esc(kw) + '</strong></td>';
        html += '<td>' + rankHTML(rd ? rd.position : null) + '</td>';
        html += '<td>' + shortPath(rd ? rd.url_path : null) + '</td>';
        html += '<td>' + rankHTML(rm ? rm.position : null) + '</td>';
        html += '<td>' + shortPath(rm ? rm.url_path : null) + '</td>';
        html += '<td>' + compCell(bestComp, myBest) + '</td></tr>';
      } else {
        const r = findRanking(kw, mode, latest);
        const rp = findRanking(kw, mode, previous);
        const comp = bestCompetitor(kw, mode, latest);
        const myPos = r ? r.position : null;
        const prevPos = rp ? rp.position : null;
        const uc = urlChanges.find(u => u.keyword === kw && u.device === mode);
        html += '<tr><td><strong>' + esc(kw) + '</strong></td>';
        html += '<td>' + rankHTML(myPos) + '</td>';
        html += '<td>' + changeHTML(myPos, prevPos) + '</td>';
        html += '<td>' + shortPath(r ? r.url_path : null) + '</td>';
        html += '<td>';
        if (r && r.url_changed) {
          const tipOld = uc ? uc.previous_url_path : '?';
          const tipNew = uc ? uc.current_url_path : (r.url_path || '?');
          html += '<span class="url-changed-icon" title="Changed from ' + esc(tipOld) + ' to ' + esc(tipNew) + '">&#x26A0;&#xFE0F;</span>';
        } else { html += '—'; }
        html += '</td>';
        html += '<td>' + compCell(comp, myPos) + '</td></tr>';
      }
    }
    html += '</tbody></table>';
    document.getElementById('rankingsTable').innerHTML = html;
  }

  function compCell(comp, myPos) {
    if (!comp) return '<span style="color:#999">—</span>';
    const ahead = myPos != null && myPos < 999 && myPos <= comp.position;
    const cls = ahead ? 'comp-ahead' : 'comp-behind';
    return '<span class="' + cls + '">' + esc(comp.domain) + ' #' + comp.position + '</span>';
  }

  // ── Competitors ─────────────────────────────────────────────
  function renderCompetitors() {
    const sec = document.getElementById('sec-competitors');
    const latest = (DATA.rankings || {}).latest || [];
    const previous = (DATA.rankings || {}).previous || [];
    const md = myDomain(latest);
    const domains = [md].concat(uniqueDomains(latest)).filter(Boolean);
    if (!domains.length) { sec.innerHTML = '<div class="card"><p style="color:#888">No competitor data available.</p></div>'; return; }

    let btns = '<div class="toggle-group" id="compDomainToggle">';
    domains.forEach((d, i) => {
      const label = d === md ? 'My Site' : esc(d);
      btns += '<button data-domain="' + esc(d) + '"' + (i === 0 ? ' class="active"' : '') + '>' + label + '</button>';
    });
    btns += '</div>';
    sec.innerHTML = '<div class="card"><h2>Competitor View</h2>' + btns + '<div id="compTable"></div></div>';

    document.getElementById('compDomainToggle').addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      this.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      buildCompTable(e.target.dataset.domain);
    });
    buildCompTable(domains[0]);
  }

  function buildCompTable(domain) {
    const latest = (DATA.rankings || {}).latest || [];
    const previous = (DATA.rankings || {}).previous || [];
    const keywords = uniqueKeywords(latest);
    let html = '<table><thead><tr><th>Keyword</th><th>&#x1F5A5; Rank</th><th>&#x1F5A5; Page</th><th>&#x1F4F1; Rank</th><th>&#x1F4F1; Page</th></tr></thead><tbody>';
    for (const kw of keywords) {
      const rd = latest.find(r => r.keyword === kw && r.device === 'desktop' && r.domain === domain);
      const rm = latest.find(r => r.keyword === kw && r.device === 'mobile' && r.domain === domain);
      html += '<tr><td><strong>' + esc(kw) + '</strong></td>';
      html += '<td>' + rankHTML(rd ? rd.position : null) + '</td>';
      html += '<td>' + shortPath(rd ? rd.url_path : null) + '</td>';
      html += '<td>' + rankHTML(rm ? rm.position : null) + '</td>';
      html += '<td>' + shortPath(rm ? rm.url_path : null) + '</td></tr>';
    }
    html += '</tbody></table>';
    document.getElementById('compTable').innerHTML = html;
  }

  // ── Trends (Sparklines) ─────────────────────────────────────
  function renderTrends() {
    const sec = document.getElementById('sec-trends');
    const history = (DATA.rankings || {}).history_14_runs || [];
    const latest = (DATA.rankings || {}).latest || [];
    const keywords = uniqueKeywords(latest);
    if (!keywords.length || !history.length) {
      sec.innerHTML = '<div class="card"><p style="color:#888">Not enough history data for trends.</p></div>';
      return;
    }

    let html = '<div class="card"><h2>Position Trends (Last 14 Runs)</h2>' +
      '<p style="font-size:.82rem;color:#888;margin-bottom:12px;">' +
      '<span style="color:var(--blue);">&#9644; Desktop</span> &nbsp; ' +
      '<span style="color:var(--orange);">&#9644; Mobile</span> &nbsp; Lower position = better ranking (top of chart = #1)</p>' +
      '<table><thead><tr><th>Keyword</th><th>Sparkline</th><th>&#x1F5A5; Current</th><th>&#x1F4F1; Current</th></tr></thead><tbody>';

    for (const kw of keywords) {
      const desktopPts = [];
      const mobilePts = [];
      for (const run of history) {
        const rankings = run.rankings || [];
        const rd = rankings.find(r => r.keyword === kw && r.device === 'desktop');
        const rm = rankings.find(r => r.keyword === kw && r.device === 'mobile');
        desktopPts.push(rd && rd.position != null ? rd.position : null);
        mobilePts.push(rm && rm.position != null ? rm.position : null);
      }
      const rd = findRanking(kw, 'desktop', latest);
      const rm = findRanking(kw, 'mobile', latest);
      html += '<tr><td><strong>' + esc(kw) + '</strong></td>';
      html += '<td>' + sparklineSVG(desktopPts, mobilePts) + '</td>';
      html += '<td>' + rankHTML(rd ? rd.position : null) + '</td>';
      html += '<td>' + rankHTML(rm ? rm.position : null) + '</td></tr>';
    }
    html += '</tbody></table></div>';
    sec.innerHTML = html;
  }

  function sparklineSVG(desktopPts, mobilePts) {
    const W = 120, H = 30, PAD = 2;
    const all = desktopPts.concat(mobilePts).filter(v => v != null);
    if (!all.length) return '<span style="color:#999">—</span>';
    const minV = 1;
    const maxV = Math.max(Math.max.apply(null, all), 10);
    const n = Math.max(desktopPts.length, mobilePts.length);

    function toPath(pts, color) {
      const segs = [];
      let started = false;
      for (let i = 0; i < pts.length; i++) {
        if (pts[i] == null) { started = false; continue; }
        const x = PAD + (i / Math.max(n - 1, 1)) * (W - 2 * PAD);
        const y = PAD + ((pts[i] - minV) / (maxV - minV)) * (H - 2 * PAD);
        segs.push((started ? 'L' : 'M') + x.toFixed(1) + ',' + y.toFixed(1));
        started = true;
      }
      if (!segs.length) return '';
      return '<path d="' + segs.join(' ') + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round"/>';
    }

    return '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" style="vertical-align:middle;">' +
      toPath(desktopPts, 'var(--blue)') +
      toPath(mobilePts, 'var(--orange)') +
      '</svg>';
  }

  // ── New Competitors ─────────────────────────────────────────
  function renderNewCompetitors() {
    const sec = document.getElementById('sec-newcompetitors');
    const disc = DATA.discovered_competitors || {};
    const unalerted = disc.unalerted || [];
    const all = disc.all || [];

    let html = '';
    if (unalerted.length) {
      html += '<div class="card"><h2>Newly Discovered Competitors</h2><div class="comp-cards">';
      for (const c of unalerted) {
        html += '<div class="comp-card"><h3>' + esc(c.domain) + '</h3>';
        html += '<p>First seen for: <strong>' + esc(c.first_seen_keyword) + '</strong> at position #' + (c.first_seen_position || '?') + '</p>';
        html += '<p>Device: ' + esc(c.first_seen_device || '?') + '</p>';
        html += '<p>Date: ' + esc(c.first_seen_date || '?') + '</p>';
        if (c.first_seen_url) html += '<p><a href="' + esc(c.first_seen_url) + '" target="_blank" rel="noopener">View URL</a></p>';
        html += '<p class="note">Not in your tracking list yet — add to config.json to track</p>';
        html += '</div>';
      }
      html += '</div></div>';
    } else {
      html += '<div class="card"><h2>Newly Discovered Competitors</h2><p style="color:#888">No new unalerted competitors.</p></div>';
    }

    if (all.length) {
      html += '<div class="card"><h2>All Discovered Competitors</h2><table><thead><tr>' +
        '<th>Domain</th><th>First Seen Keyword</th><th>Position</th><th>Device</th><th>Date</th><th>Alerted</th><th>Notes</th>' +
        '</tr></thead><tbody>';
      for (const c of all) {
        html += '<tr><td>' + esc(c.domain) + '</td><td>' + esc(c.first_seen_keyword) + '</td>';
        html += '<td>' + (c.first_seen_position || '—') + '</td><td>' + esc(c.first_seen_device || '—') + '</td>';
        html += '<td>' + esc(c.first_seen_date || '—') + '</td>';
        html += '<td>' + (c.alerted ? '&#x2705;' : '&#x274C;') + '</td>';
        html += '<td>' + esc(c.notes || '') + '</td></tr>';
      }
      html += '</tbody></table></div>';
    }
    sec.innerHTML = html || '<div class="card"><p style="color:#888">No discovered competitor data.</p></div>';
  }

  // ── Redirects ───────────────────────────────────────────────
  function renderRedirects() {
    const sec = document.getElementById('sec-redirects');
    const redir = DATA.redirect || {};
    const health = redir.health || [];
    const consKw = redir.consolidation_by_keyword || [];
    const overallPct = redir.overall_consolidation_pct || 0;
    const hist = redir.history_30_days || [];
    const sightings = redir.sightings_latest_run || [];

    let html = '';

    // 301 Health
    if (health.length) {
      html += '<div class="card"><h2>301 Redirect Health</h2><div class="health-cards">';
      for (const h of health) {
        const ok = h.is_healthy;
        html += '<div class="health-card ' + (ok ? 'healthy' : 'unhealthy') + '">';
        html += '<strong>' + esc(h.old_domain) + '</strong> &rarr; ';
        html += (ok ? '&#x2705; Healthy' : '&#x274C; UNHEALTHY') + '<br>';
        html += '<span style="font-size:.82rem;color:#666;">Status: ' + (h.http_status || '?') + ' &middot; ';
        html += 'Hops: ' + ((h.redirect_chain || []).length || '?') + ' &middot; ';
        html += 'Checked: ' + fmtSGT(h.checked_at) + '</span>';
        if (h.error) html += '<br><span style="font-size:.82rem;color:var(--red);">' + esc(h.error) + '</span>';
        if (h.final_destination_url) html += '<br><span style="font-size:.78rem;color:#888;">&rarr; ' + esc(h.final_destination_url) + '</span>';
        html += '</div>';
      }
      html += '</div></div>';
    }

    // Overall progress
    html += '<div class="card"><h2>Google Consolidation Progress</h2>';
    const totalKw = consKw.length || 1;
    const consolidated = consKw.filter(c => c.desktop_status === 'only_main' && c.mobile_status === 'only_main').length;
    html += '<div class="progress-wrap"><div class="progress-label">' + overallPct + '% complete &mdash; ' + consolidated + ' of ' + consKw.length + ' keywords fully consolidated</div>';
    html += '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(overallPct, 100) + '%"></div></div></div></div>';

    // Per-keyword consolidation table
    if (consKw.length) {
      html += '<div class="card"><h2>Per-Keyword Consolidation</h2><table><thead><tr>' +
        '<th>Keyword</th><th>Old Domain</th><th>Their Pos</th><th>My Pos</th><th>Desktop</th><th>Mobile</th><th>First Seen</th><th>Last Seen</th>' +
        '</tr></thead><tbody>';
      for (const c of consKw) {
        html += '<tr><td><strong>' + esc(c.keyword) + '</strong></td>';
        html += '<td>' + esc(c.old_domain) + '</td>';
        html += '<td>' + (c.their_position || '—') + '</td>';
        html += '<td>' + (c.my_position || '—') + '</td>';
        html += '<td>' + statusIcon(c.desktop_status) + '</td>';
        html += '<td>' + statusIcon(c.mobile_status) + '</td>';
        html += '<td>' + esc(c.first_seen || '—') + '</td>';
        html += '<td>' + esc(c.last_seen || '—') + '</td></tr>';
      }
      html += '</tbody></table></div>';
    }

    // Consolidation timeline chart
    if (hist.length > 1) {
      html += '<div class="chart-container"><h3 style="font-family:Georgia,serif;margin-bottom:12px;">Consolidation Timeline (30 Days)</h3>';
      html += consolidationChart(hist);
      html += '</div>';
    }

    // Sightings
    if (sightings.length) {
      html += '<div class="card"><h2>Old Domain Sightings (Latest Run)</h2><table><thead><tr>' +
        '<th>Keyword</th><th>Device</th><th>Old Domain</th><th>Position</th><th>URL</th><th>Main Domain Pos</th><th>Gap</th><th>Status</th>' +
        '</tr></thead><tbody>';
      for (const s of sightings) {
        html += '<tr><td>' + esc(s.keyword) + '</td><td>' + esc(s.device) + '</td>';
        html += '<td>' + esc(s.old_domain) + '</td><td>' + (s.position || '—') + '</td>';
        html += '<td>' + shortPath(s.url, 30) + '</td>';
        html += '<td>' + (s.main_domain_position || '—') + '</td>';
        html += '<td>' + (s.cannibalization_gap != null ? s.cannibalization_gap : '—') + '</td>';
        html += '<td>' + statusIcon(s.status) + '</td></tr>';
      }
      html += '</tbody></table></div>';
    }

    sec.innerHTML = html || '<div class="card"><p style="color:#888">No redirect data available.</p></div>';
  }

  function statusIcon(status) {
    const map = {
      'outranking': '<span class="status-icon" title="Old domain outranking">&#x1F534; outranking</span>',
      'both_present': '<span class="status-icon" title="Both still indexed">&#x1F7E1; both present</span>',
      'only_main': '<span class="status-icon" title="Consolidated">&#x2705; consolidated</span>',
      'neither': '<span class="status-icon" title="Neither ranking">&#x2796; neither</span>'
    };
    return map[status] || esc(status || '—');
  }

  function consolidationChart(hist) {
    const W = 600, H = 200, PAD_L = 40, PAD_R = 20, PAD_T = 10, PAD_B = 40;
    const cW = W - PAD_L - PAD_R, cH = H - PAD_T - PAD_B;
    const n = hist.length;
    let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="max-width:100%;height:auto;">';

    // Grid lines
    for (let pct = 0; pct <= 100; pct += 25) {
      const y = PAD_T + cH - (pct / 100) * cH;
      svg += '<line x1="' + PAD_L + '" y1="' + y + '" x2="' + (W - PAD_R) + '" y2="' + y + '" stroke="#e5e0d8" stroke-width="1"/>';
      svg += '<text x="' + (PAD_L - 5) + '" y="' + (y + 4) + '" text-anchor="end" font-size="10" fill="#999">' + pct + '%</text>';
    }

    // Goal line at 100%
    const goalY = PAD_T;
    svg += '<line x1="' + PAD_L + '" y1="' + goalY + '" x2="' + (W - PAD_R) + '" y2="' + goalY + '" stroke="var(--green)" stroke-width="1" stroke-dasharray="5,3"/>';
    svg += '<text x="' + (W - PAD_R + 2) + '" y="' + (goalY + 4) + '" font-size="9" fill="var(--green)">Goal</text>';

    // Data line
    const pts = [];
    for (let i = 0; i < n; i++) {
      const x = PAD_L + (i / Math.max(n - 1, 1)) * cW;
      const pct = hist[i].pct != null ? hist[i].pct : 0;
      const y = PAD_T + cH - (pct / 100) * cH;
      pts.push(x.toFixed(1) + ',' + y.toFixed(1));
    }
    svg += '<polyline points="' + pts.join(' ') + '" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';

    // Dots
    for (let i = 0; i < n; i++) {
      const x = PAD_L + (i / Math.max(n - 1, 1)) * cW;
      const pct = hist[i].pct != null ? hist[i].pct : 0;
      const y = PAD_T + cH - (pct / 100) * cH;
      svg += '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="3" fill="var(--green)"/>';
    }

    // X-axis labels (show ~5 evenly spaced)
    const step = Math.max(1, Math.floor(n / 5));
    for (let i = 0; i < n; i += step) {
      const x = PAD_L + (i / Math.max(n - 1, 1)) * cW;
      const label = hist[i].date || '';
      svg += '<text x="' + x.toFixed(1) + '" y="' + (H - 5) + '" text-anchor="middle" font-size="9" fill="#999">' + esc(label) + '</text>';
    }
    // Always show last label
    if ((n - 1) % step !== 0) {
      const x = PAD_L + cW;
      svg += '<text x="' + x.toFixed(1) + '" y="' + (H - 5) + '" text-anchor="middle" font-size="9" fill="#999">' + esc(hist[n - 1].date || '') + '</text>';
    }

    svg += '</svg>';
    return svg;
  }

  // ── Run Log ─────────────────────────────────────────────────
  function renderRunLog() {
    const sec = document.getElementById('sec-runlog');
    const logs = (DATA.run_log || []).slice(-10).reverse();
    if (!logs.length) {
      sec.innerHTML = '<div class="card"><p style="color:#888">No run log entries.</p></div>';
      return;
    }
    let html = '<div class="card"><h2>Run Log (Last 10 Runs)</h2><table><thead><tr>' +
      '<th>Time</th><th>Keywords Checked</th><th>API Calls</th><th>Status</th><th>Errors</th>' +
      '</tr></thead><tbody>';
    for (const l of logs) {
      const statusCls = l.status === 'success' ? 'color:var(--green)' : (l.status === 'error' ? 'color:var(--red)' : '');
      html += '<tr><td>' + fmtSGT(l.run_time) + '</td>';
      html += '<td>' + (l.keywords_checked != null ? l.keywords_checked : '—') + '</td>';
      html += '<td>' + (l.api_calls_used != null ? l.api_calls_used : '—') + '</td>';
      html += '<td><span style="' + statusCls + '">' + esc(l.status || '—') + '</span></td>';
      html += '<td>' + esc(l.errors || '—') + '</td></tr>';
    }
    html += '</tbody></table></div>';
    sec.innerHTML = html;
  }

})();
</script>
</body>
</html>
